<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase Online Chess</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
      :root {
        --bg: #0d0d0d;
        --surface: #161616;
        --surface2: #1f1f1f;
        --border: rgba(255,255,255,0.07);
        --accent: #e8ff47;
        --text: #f0f0f0;
        --muted: rgba(255,255,255,0.35);
        --light-sq: #f0d9b5;
        --dark-sq: #b58863;
        --selected: rgba(232,255,71,0.55);
        --check: rgba(248,113,113,0.6);
        --last-move: rgba(100,200,255,0.25);
      }
      * { margin:0; padding:0; box-sizing:border-box; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        min-height: 100vh;
      }

      .navbar {
        background: var(--surface) !important;
        border-bottom: 1px solid var(--border);
        padding: 12px 24px;
        font-family: 'Bebas Neue', sans-serif;
      }
      .navbar-brand { color: var(--accent) !important; font-size: 24px; letter-spacing: 1px; }

      .layout {
        display: grid;
        grid-template-columns: 320px 1fr 320px;
        gap: 20px;
        max-width: 1400px;
        margin: 20px auto;
        padding: 0 20px;
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }
      .panel-header {
        padding: 12px 16px;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
        font-family: 'Bebas Neue', sans-serif;
        color: var(--accent);
      }
      .panel-body { padding: 16px; }

      /* Chess Board */
      #board {
        display: grid;
        grid-template-columns: repeat(8, 65px);
        grid-template-rows: repeat(8, 65px);
        border: 4px solid #2a2a2a;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      }
      .cell {
        width: 65px; height: 65px;
        display: flex; align-items: center; justify-content: center;
        font-size: 45px;
        cursor: pointer;
        user-select: none;
      }
      .cell.light { background: var(--light-sq); }
      .cell.dark { background: var(--dark-sq); }
      .cell.selected { background: var(--selected) !important; }
      .cell.legal-move::after {
        content: ''; width: 20px; height: 20px;
        background: rgba(0,0,0,0.15); border-radius: 50%;
      }
      .cell.in-check { background: var(--check) !important; }
      .cell.last-move { background: var(--last-move) !important; }

      /* UI Elements */
      .room-input {
        width: 100%; background: var(--surface2); border: 1px solid var(--border);
        color: white; padding: 8px; border-radius: 6px; margin-bottom: 10px;
      }
      .btn-custom {
        width: 100%; padding: 8px; border-radius: 6px; border: none; font-weight: bold; margin-bottom: 5px;
      }
      .btn-primary { background: var(--accent); color: black; }
      .btn-outline { background: transparent; border: 1px solid var(--border); color: white; }
      
      .status-bar { font-size: 12px; color: var(--muted); margin-top: 10px; }
      .captured-row { font-size: 20px; min-height: 30px; }
      .move-list { height: 150px; overflow-y: auto; font-size: 13px; color: var(--muted); }
      
      .timer { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); }
      .player-info { display: flex; justify-content: space-between; align-items: center; width: 520px; padding: 10px; }

      /* Promotion */
      .promo-modal {
        position: fixed; inset: 0; background: rgba(0,0,0,0.8);
        display: none; align-items: center; justify-content: center; z-index: 100;
      }
      .promo-modal.open { display: flex; }
      .promo-box { background: var(--surface); padding: 20px; border-radius: 12px; text-align: center; }

      @media (max-width: 1100px) {
        .layout { grid-template-columns: 1fr; }
        .player-info { width: 100%; }
      }
    </style>
  </head>
  <body>
    <nav class="navbar"><div class="container-fluid"><span class="navbar-brand">♟ SUPABASE CHESS ONLINE</span></div></nav>

    <div class="layout">
      <div class="d-flex flex-column gap-3">
        <div class="panel">
          <div class="panel-header">ROOM SETUP</div>
          <div class="panel-body">
            <input id="roomId" class="room-input" placeholder="Room Name"/>
            <input id="roomPw" class="room-input" type="password" placeholder="Password"/>
            <button class="btn-custom btn-primary" onclick="createRoom()">⚔ CREATE HOST</button>
            <button class="btn-custom btn-outline" onclick="joinRoom()">🚪 JOIN ROOM</button>
            <div id="statusText" class="status-bar">Waiting for connection...</div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">GAME INFO</div>
          <div class="panel-body">
            <div class="mb-2">Side: <span id="mySide" class="text-white">-</span></div>
            <div class="mb-2">Turn: <span id="turnDisplay" class="text-white">WHITE</span></div>
            <hr style="border-color: var(--border)">
            <div class="small text-muted mb-1">White Captured:</div>
            <div id="capByWhite" class="captured-row"></div>
            <div class="small text-muted mb-1 mt-2">Black Captured:</div>
            <div id="capByBlack" class="captured-row"></div>
          </div>
        </div>
      </div>

      <div class="d-flex flex-column align-items-center">
        <div class="player-info">
          <span>BLACK (Opponent)</span>
          <div id="timerB" class="timer">10:00</div>
        </div>
        
        <div id="board"></div>

        <div class="player-info">
          <span>WHITE (You)</span>
          <div id="timerW" class="timer">10:00</div>
        </div>

        <div class="mt-3 d-flex gap-2">
          <button class="btn-custom btn-outline px-4" onclick="offerDraw()">Draw</button>
          <button class="btn-custom btn-outline px-4 text-danger" onclick="resign()">Resign</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">MOVE HISTORY</div>
        <div class="panel-body">
          <div id="moveList" class="move-list"></div>
          <hr style="border-color: var(--border)">
          <div class="panel-header p-0 mb-2" style="background:none">RESULT</div>
          <div id="resultDisplay" class="h4 text-center">—</div>
        </div>
      </div>
    </div>

    <div id="promoModal" class="promo-modal">
      <div class="promo-box">
        <h5 class="text-white mb-3">PROMOTE PAWN</h5>
        <div id="promoPieces" class="d-flex gap-2"></div>
      </div>
    </div>

    <script>
      // CONFIG SUPABASE (ใช้ Key เดิมของคุณ)
      const SUPABASE_URL = "https://mhmchtcteweifnjegdgw.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1obWNodGN0ZXdlaWZuamVnZGd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNDgzMjAsImV4cCI6MjA5MjkyNDMyMH0.7V0ZuFl2ESRkgEQnB1CX3_AZYSwkXwXl10vcVNNCDpQ";
      const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // CHESS LOGIC & STATE
      const PIECES = { wK:'♔', wQ:'♕', wR:'♖', wB:'♗', wN:'♘', wP:'♙', bK:'♚', bQ:'♛', bR:'♜', bB:'♝', bN:'♞', bP:'♟' };
      let state = {
        board: [], turn: 'w', castling: 'KQkq', ep: '-', half: 0, full: 1
      };
      let myColor = null; // 'w' or 'b'
      let currentRoom = null;
      let selected = null;
      let legalMoves = [];
      let moveHistory = [];
      let timers = { w: 600, b: 600 };
      let gameActive = false;

      // Initialize
      function initGame() {
        const fen = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";
        parseFen(fen);
        renderBoard();
      }

      function parseFen(fen) {
        const [placement, turn, castling, ep, half, full] = fen.split(' ');
        state.turn = turn;
        state.castling = castling;
        state.ep = ep;
        state.board = [];
        placement.split('/').forEach(row => {
          let r = [];
          for (let char of row) {
            if (/\d/.test(char)) for (let i=0; i<+char; i++) r.push(null);
            else r.push({ color: char === char.toUpperCase() ? 'w' : 'b', type: char.toUpperCase() });
          }
          state.board.push(r);
        });
      }

      function boardToFen() {
        const rows = state.board.map(r => {
          let s = '', empty = 0;
          r.forEach(cell => {
            if (!cell) empty++;
            else {
              if (empty) { s += empty; empty = 0; }
              s += cell.color === 'w' ? cell.type : cell.type.toLowerCase();
            }
          });
          return empty ? s + empty : s;
        });
        return `${rows.join('/')} ${state.turn} ${state.castling} ${state.ep} ${state.half} ${state.full}`;
      }

      // Render
      function renderBoard() {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';
        for (let r=0; r<8; r++) {
          for (let c=0; c<8; c++) {
            const cell = document.createElement('div');
            cell.className = `cell ${(r+c)%2===0 ? 'light' : 'dark'}`;
            const piece = state.board[r][c];
            if (piece) cell.textContent = PIECES[piece.color + piece.type];
            
            if (selected && selected[0] === r && selected[1] === c) cell.classList.add('selected');
            if (legalMoves.some(m => m.r === r && m.c === c)) cell.classList.add('legal-move');

            cell.onclick = () => handleCellClick(r, c);
            boardEl.appendChild(cell);
          }
        }
        document.getElementById('turnDisplay').textContent = state.turn === 'w' ? 'WHITE' : 'BLACK';
      }

      // Interaction
      async function handleCellClick(r, c) {
        if (!gameActive || (myColor && state.turn !== myColor)) return;

        const piece = state.board[r][c];
        if (selected) {
          const move = legalMoves.find(m => m.r === r && m.c === c);
          if (move) {
            executeMove(selected, [r, c], move);
            selected = null; legalMoves = [];
            await syncToSupabase();
            return;
          }
        }

        if (piece && piece.color === state.turn) {
          selected = [r, c];
          legalMoves = getSimpleLegalMoves(r, c); // แบบง่ายเพื่อสาธิต
          renderBoard();
        } else {
          selected = null; legalMoves = [];
          renderBoard();
        }
      }

      function executeMove(from, to, move) {
        const piece = state.board[from[0]][from[1]];
        state.board[to[0]][to[1]] = piece;
        state.board[from[0]][from[1]] = null;
        state.turn = state.turn === 'w' ? 'b' : 'w';
        moveHistory.push(`${PIECES[piece.color+piece.type]} ${String.fromCharCode(97+to[1])}${8-to[0]}`);
        updateUI();
        renderBoard();
      }

      function getSimpleLegalMoves(r, c) {
        // Logic จำลอง (ในโปรเจกต์จริงควรใช้ chess.js หรือ Engine เต็มรูปแบบ)
        let moves = [];
        for(let i=0; i<8; i++) for(let j=0; j<8; j++) {
            if ((r+c+i+j)%2 !== 0) moves.push({r:i, c:j}); // จำลองเดินได้ทุกที่ที่เป็นคนละสี
        }
        return moves;
      }

      function updateUI() {
        const list = document.getElementById('moveList');
        list.innerHTML = moveHistory.map((m, i) => `<div>${i+1}. ${m}</div>`).join('');
        list.scrollTop = list.scrollHeight;
      }

      // Supabase Sync
      async function createRoom() {
        const id = document.getElementById('roomId').value;
        const pw = document.getElementById('roomPw').value;
        if (!id) return alert("Please enter Room ID");

        const initialFen = boardToFen();
        const { error } = await db.from('rooms').upsert({
          id, password: pw, fen: initialFen, move_history: '[]', game_over: false
        });

        if (!error) {
          myColor = 'w';
          currentRoom = id;
          gameActive = true;
          document.getElementById('mySide').textContent = "WHITE";
          document.getElementById('statusText').textContent = "🟢 HOSTING: " + id;
          listenRoom();
        }
      }

      async function joinRoom() {
        const id = document.getElementById('roomId').value;
        const pw = document.getElementById('roomPw').value;
        const { data, error } = await db.from('rooms').select('*').eq('id', id).eq('password', pw).single();

        if (data) {
          myColor = 'b';
          currentRoom = id;
          gameActive = true;
          parseFen(data.fen);
          document.getElementById('mySide').textContent = "BLACK";
          document.getElementById('statusText').textContent = "🟢 JOINED: " + id;
          renderBoard();
          listenRoom();
        } else {
          alert("Room not found or password incorrect");
        }
      }

      async function syncToSupabase() {
        if (!currentRoom) return;
        await db.from('rooms').update({
          fen: boardToFen(),
          move_history: JSON.stringify(moveHistory)
        }).eq('id', currentRoom);
      }

      function listenRoom() {
        db.channel('chess-' + currentRoom)
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${currentRoom}` }, 
          payload => {
            if (payload.new.fen !== boardToFen()) {
              parseFen(payload.new.fen);
              moveHistory = JSON.parse(payload.new.move_history);
              updateUI();
              renderBoard();
            }
          }).subscribe();
      }

      // Timer (Simple)
      setInterval(() => {
        if (!gameActive) return;
        timers[state.turn]--;
        const t = timers[state.turn];
        const display = `${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}`;
        document.getElementById(state.turn === 'w' ? 'timerW' : 'timerB').textContent = display;
      }, 1000);

      initGame();
    </script>
  </body>
</html>
