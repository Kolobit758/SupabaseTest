<!doctype html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student System</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080810;
      --surface: #0f0f1a;
      --surface2: #161625;
      --border: rgba(255,255,255,0.07);
      --accent: #e8ff47;
      --accent-dim: rgba(232,255,71,0.12);
      --text: #f0f0f0;
      --muted: rgba(255,255,255,0.35);
      --red: #f87171;
      --green: #4ade80;
    }
    body[data-theme="light"] {
      --bg: #f0f2f8;
      --surface: #ffffff;
      --surface2: #e8eaf2;
      --border: rgba(0,0,0,0.08);
      --accent: #5b4fff;
      --accent-dim: rgba(91,79,255,0.1);
      --text: #111;
      --muted: rgba(0,0,0,0.45);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "DM Sans", sans-serif;
      overflow-x: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* THEME TOGGLE */
    .theme-toggle {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); width: 42px; height: 42px; border-radius: 12px;
      cursor: pointer; font-size: 18px; display: flex; align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: background 0.3s, transform 0.2s, box-shadow 0.2s;
    }
    .theme-toggle:hover { transform: scale(1.1) rotate(15deg); }

    /* HERO */
    .hero { position: relative; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .slide { position: absolute; inset: -80px; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.4s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
    .slide.active { opacity: 1; }
    .slide-1 { background-image: url("meow.png"); }
    .slide-2 { background-image: url("meow1.png"); }
    .slide-3 { background-image: url("meow2.png"); }
    .slide-4 { background-image: url("meow3.png"); }
    .slide-5 { background-image: url("meow4.png"); }
    .slide-6 { background-image: url("meow5.png"); }
    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(8,8,16,0.15) 0%, rgba(8,8,16,0.55) 60%, rgba(8,8,16,1) 100%); z-index: 1; }
    .hero-content { position: relative; z-index: 2; text-align: center; padding: 0 24px; }
    .hero-eyebrow { font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; opacity: 0; animation: fadeUp 0.8s 0.3s ease forwards; }
    .hero-title { font-family: "Bebas Neue", sans-serif; font-size: clamp(5rem,12vw,10rem); line-height: 0.88; color: #fff; opacity: 0; animation: fadeUp 0.8s 0.5s ease forwards; }
    .hero-title span { color: var(--accent); }
    .hero-sub { margin-top: 18px; color: rgba(255,255,255,0.5); font-size: 15px; font-weight: 300; opacity: 0; animation: fadeUp 0.8s 0.7s ease forwards; }
    .hero-cta { margin-top: 32px; opacity: 0; animation: fadeUp 0.8s 0.9s ease forwards; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-cta { background: var(--accent); color: #080810; border: none; border-radius: 12px; padding: 13px 28px; font-family: "DM Sans", sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 24px rgba(232,255,71,0.3); text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
    .btn-cta:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(232,255,71,0.45); }
    .btn-cta-ghost { background: rgba(255,255,255,0.07); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 13px 28px; font-family: "DM Sans", sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s, transform 0.2s; backdrop-filter: blur(8px); display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
    .btn-cta-ghost:hover { background: rgba(255,255,255,0.14); transform: translateY(-3px); }
    .arrow { position: absolute; top: 50%; transform: translateY(-50%); z-index: 3; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); color: #fff; width: 48px; height: 48px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, border-color 0.2s, transform 0.2s; backdrop-filter: blur(8px); }
    .arrow:hover { background: rgba(232,255,71,0.15); border-color: var(--accent); color: var(--accent); transform: translateY(-50%) scale(1.1); }
    .arrow-left { left: 28px; }
    .arrow-right { right: 28px; }
    .dots { position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 3; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.3s ease; }
    .dot.active { background: var(--accent); width: 24px; border-radius: 3px; }
    .scroll-hint { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 8px; color: rgba(255,255,255,0.3); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; }
    .scroll-bar { width: 1px; height: 48px; background: linear-gradient(to bottom, rgba(232,255,71,0.6), transparent); animation: pulse 2s ease-in-out infinite; }

    /* MAIN */
    .main { padding: 72px 32px 80px; max-width: 1140px; margin: 0 auto; }
    .section-label { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }

    /* FORM CARD */
    .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 36px; margin-bottom: 52px; position: relative; overflow: hidden; opacity: 0; animation: fadeUp 0.7s 0.2s ease forwards; transition: background 0.4s, border-color 0.4s; }
    .form-card::before { content: ""; position: absolute; top: 0; left: 15%; right: 15%; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.6; }
    .form-title { font-family: "Bebas Neue", sans-serif; font-size: 20px; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 20px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .input-group { flex: 1; min-width: 150px; }
    .input-group label { display: block; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    input[type="text"] { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 13px 18px; color: var(--text); font-family: "DM Sans", sans-serif; font-size: 14px; outline: none; transition: border-color 0.25s, box-shadow 0.25s, background 0.4s; }
    input::placeholder { color: var(--muted); }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .upload-label { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px dashed rgba(232,255,71,0.35); border-radius: 12px; padding: 13px 16px; cursor: pointer; font-size: 13px; color: var(--muted); transition: border-color 0.2s, color 0.2s, background 0.2s; white-space: nowrap; }
    body[data-theme="light"] .upload-label { border-color: rgba(91,79,255,0.35); }
    .upload-label:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .upload-label input { display: none; }
    #fileNameDisplay { font-size: 12px; color: var(--accent); max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-add { background: var(--accent); border: none; border-radius: 12px; padding: 13px 28px; color: #080810; font-family: "DM Sans", sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 24px rgba(232,255,71,0.25); }
    .btn-add:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(232,255,71,0.4); }
    .btn-add:active { transform: scale(0.97); }
    .btn-add:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* TOOLBAR */
    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 12px; flex-wrap: wrap; opacity: 0; animation: fadeUp 0.7s 0.35s ease forwards; }
    .toolbar-left { display: flex; align-items: center; gap: 12px; }
    .stats-title { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .count { font-size: 12px; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(232,255,71,0.2); padding: 3px 12px; border-radius: 999px; font-weight: 600; }
    .search-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 9px 16px; color: var(--text); font-family: "DM Sans", sans-serif; font-size: 13px; outline: none; width: 210px; transition: border-color 0.25s, box-shadow 0.25s; }
    .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .search-box::placeholder { color: var(--muted); }

    /* GRID */
    #list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 18px; }

    /* STUDENT CARD */
    .student-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; opacity: 0; transform: translateY(20px) scale(0.96); animation: cardIn 0.45s ease forwards; transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s, background 0.4s; }
    .student-card:hover { border-color: rgba(232,255,71,0.3); box-shadow: 0 12px 40px rgba(0,0,0,0.5); transform: translateY(-5px) scale(1.015); }
    @keyframes cardIn { to { opacity:1; transform: translateY(0) scale(1); } }
    .card-img-wrap { overflow: hidden; height: 165px; }
    .card-img { width: 100%; height: 165px; object-fit: cover; display: block; background: var(--surface2); transition: transform 0.4s ease; }
    .student-card:hover .card-img { transform: scale(1.05); }
    .card-avatar-fallback { width: 100%; height: 165px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1c1c30, #2a2a45); font-family: "Bebas Neue", sans-serif; font-size: 68px; color: var(--accent); letter-spacing: 2px; }
    .card-body { padding: 18px; }
    .card-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .card-status { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 999px; margin-bottom: 16px; }
    .pulse-dot { width: 5px; height: 5px; border-radius: 50%; }
    .status-available { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
    .status-available .pulse-dot { background: var(--green); animation: blink 2s infinite; }
    .status-busy { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
    .status-busy .pulse-dot { background: var(--red); }
    .status-other { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(232,255,71,0.15); }
    .status-other .pulse-dot { background: var(--accent); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .card-actions { display: flex; gap: 8px; }
    .btn-edit, .btn-delete { flex: 1; border: none; border-radius: 9px; padding: 9px 0; font-family: "DM Sans", sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: transform 0.15s, background 0.2s, box-shadow 0.2s; }
    .btn-edit { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.65); border: 1px solid rgba(255,255,255,0.1); }
    .btn-edit:hover { background: rgba(255,255,255,0.13); color: #fff; transform: translateY(-1px); }
    body[data-theme="light"] .btn-edit { background: rgba(0,0,0,0.04); color: rgba(0,0,0,0.6); border-color: rgba(0,0,0,0.1); }
    body[data-theme="light"] .btn-edit:hover { background: rgba(0,0,0,0.08); color: #000; }
    .btn-delete { background: rgba(248,113,113,0.08); color: var(--red); border: 1px solid rgba(248,113,113,0.18); }
    .btn-delete:hover { background: rgba(248,113,113,0.2); box-shadow: 0 4px 16px rgba(248,113,113,0.15); transform: translateY(-1px); }
    .btn-edit:active, .btn-delete:active { transform: scale(0.95); }

    /* EMPTY */
    .empty { grid-column:1/-1; text-align:center; padding:64px 20px; color:var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.25; }

    /* TOAST */
    .toast { position: fixed; bottom: 32px; right: 32px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); color: var(--text); font-size: 13px; padding: 12px 20px; border-radius: 12px; z-index: 9999; opacity: 0; transform: translateY(16px) scale(0.95); transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0) scale(1); }

    /* MODAL */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 36px; width: 100%; max-width: 440px; position: relative; transform: translateY(32px) scale(0.95); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); max-height: 90vh; overflow-y: auto; }
    .modal-backdrop.open .modal { transform: translateY(0) scale(1); }
    .modal::before { content: ""; position: absolute; top: 0; left: 15%; right: 15%; height: 1px; background: linear-gradient(90deg,transparent,var(--accent),transparent); opacity: 0.6; }
    .modal-title { font-family: "Bebas Neue", sans-serif; font-size: 28px; letter-spacing: 0.05em; color: var(--accent); margin-bottom: 24px; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: var(--muted); width: 34px; height: 34px; border-radius: 50%; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, color 0.2s, transform 0.2s; }
    .modal-close:hover { background: rgba(248,113,113,0.15); color: var(--red); border-color: rgba(248,113,113,0.3); transform: rotate(90deg); }
    .modal-field { margin-bottom: 16px; }
    .modal-field label { display: block; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .modal-field input[type="text"] { width: 100%; min-width: unset; flex: unset; }
    .img-preview-wrap { position: relative; margin-bottom: 16px; border-radius: 14px; overflow: hidden; }
    .img-preview { width: 100%; height: 190px; object-fit: cover; display: block; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; }
    .img-preview-fallback { width: 100%; height: 190px; border-radius: 14px; background: linear-gradient(135deg,#1c1c30,#2a2a45); display: flex; align-items: center; justify-content: center; font-family: "Bebas Neue", sans-serif; font-size: 76px; color: var(--accent); border: 1px solid var(--border); }
    .img-change-btn { position: absolute; bottom: 12px; right: 12px; background: rgba(8,8,16,0.88); border: 1px solid rgba(232,255,71,0.45); color: var(--accent); font-family: "DM Sans", sans-serif; font-size: 11px; font-weight: 600; padding: 7px 16px; border-radius: 9px; cursor: pointer; backdrop-filter: blur(8px); transition: background 0.2s, transform 0.2s; }
    .img-change-btn:hover { background: rgba(232,255,71,0.18); transform: scale(1.05); }
    .img-change-btn input { display: none; }
    .new-img-badge { position: absolute; top: 12px; left: 12px; background: var(--accent); color: #080810; font-size: 9px; font-weight: 800; letter-spacing: 0.15em; padding: 4px 9px; border-radius: 5px; text-transform: uppercase; display: none; }
    .new-img-badge.visible { display: block; }
    .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
    .btn-modal-cancel { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); border-radius: 12px; padding: 12px; font-family: "DM Sans", sans-serif; font-size: 13px; cursor: pointer; transition: background 0.2s, color 0.2s; }
    .btn-modal-cancel:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .btn-modal-save { flex: 2; background: var(--accent); border: none; border-radius: 12px; padding: 12px; color: #080810; font-family: "DM Sans", sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 24px rgba(232,255,71,0.25); transition: transform 0.2s, box-shadow 0.2s; }
    .btn-modal-save:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(232,255,71,0.4); }
    .btn-modal-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* FLAPPY BIRD */
    .game-section { margin-top: 80px; padding-top: 60px; border-top: 1px solid var(--border); opacity: 0; animation: fadeUp 0.7s 0.5s ease forwards; }
    .game-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .game-score-display { display: flex; gap: 12px; }
    .score-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px 22px; text-align: center; }
    .score-pill-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
    .score-pill-val { font-family: "Bebas Neue", sans-serif; font-size: 30px; color: var(--accent); line-height: 1; }
    .game-canvas-wrap { border-radius: 20px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 16px 48px rgba(0,0,0,0.5); max-width: 480px; margin: 0 auto; }
    #flappyCanvas { display: block; width: 100%; }
    .game-controls { margin-top: 16px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn-game { background: var(--accent); border: none; border-radius: 12px; padding: 11px 28px; color: #080810; font-family: "DM Sans", sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(232,255,71,0.25); }
    .btn-game:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,255,71,0.4); }
    .btn-game-ghost { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 11px 28px; color: var(--text); font-family: "DM Sans", sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s, transform 0.2s; }
    .btn-game-ghost:hover { background: var(--surface2); transform: translateY(-1px); }
    .game-hint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 10px; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
  </style>
</head>
<body>

<button class="theme-toggle" id="themeToggle">🌙</button>

<!-- HERO -->
<div class="hero">
  <div class="slide slide-1 active"></div>
  <div class="slide slide-2"></div>
  <div class="slide slide-3"></div>
  <div class="slide slide-4"></div>
  <div class="slide slide-5"></div>
  <div class="slide slide-6"></div>
  <div class="hero-overlay"></div>
  <button class="arrow arrow-left" onclick="prevSlide()">&#8592;</button>
  <button class="arrow arrow-right" onclick="nextSlide()">&#8594;</button>
  <div class="hero-content">
    <div class="hero-eyebrow">Student Management System</div>
    <h1 class="hero-title">STUDENT<br /><span>SYSTEM</span></h1>
    <p class="hero-sub">จัดการข้อมูลนักเรียนของคุณ อย่างมีสไตล์</p>
    <div class="hero-cta">
      <a href="#main" class="btn-cta">📋 จัดการนักเรียน</a>
      <a href="#game" class="btn-cta-ghost">🎮 เล่น Flappy Bird</a>
    </div>
  </div>
  <div class="scroll-hint"><span>scroll</span><div class="scroll-bar"></div></div>
  <div class="dots" id="dots">
    <div class="dot active" onclick="goSlide(0)"></div>
    <div class="dot" onclick="goSlide(1)"></div>
    <div class="dot" onclick="goSlide(2)"></div>
    <div class="dot" onclick="goSlide(3)"></div>
    <div class="dot" onclick="goSlide(4)"></div>
    <div class="dot" onclick="goSlide(5)"></div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="form-card">
    <div class="section-label">+ เพิ่มนักเรียนใหม่</div>
    <div class="form-title">เพิ่มนักเรียน</div>
    <div class="form-row">
      <div class="input-group">
        <label>ชื่อนักเรียน</label>
        <input id="nameInput" type="text" placeholder="กรอกชื่อ..." />
      </div>
      <div class="input-group">
        <label>สถานะ</label>
        <input id="statusInput" type="text" placeholder="available / busy" />
      </div>
      <label class="upload-label">
        <span>📷</span>
        <span id="fileNameDisplay">เลือกรูป</span>
        <input type="file" id="avatarInput" accept="image/*" onchange="onFileChange(this)" />
      </label>
      <button class="btn-add" id="btnAdd" onclick="addStudent()">เพิ่ม →</button>

<script>
// ═══ THEME ═══
const toggleBtn = document.getElementById("themeToggle");
if (localStorage.getItem("theme") === "light") { document.body.setAttribute("data-theme","light"); toggleBtn.textContent = "☀️"; }
toggleBtn.onclick = () => {
  const isLight = document.body.getAttribute("data-theme") === "light";
  if (isLight) { document.body.removeAttribute("data-theme"); localStorage.setItem("theme","dark"); toggleBtn.textContent = "🌙"; }
  else { document.body.setAttribute("data-theme","light"); localStorage.setItem("theme","light"); toggleBtn.textContent = "☀️"; }
};

// ═══ SLIDESHOW ═══
let current = 0;
const slides = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dot");
function goSlide(n) {
  slides[current].classList.remove("active"); dots[current].classList.remove("active");
  current = (n + slides.length) % slides.length;
  slides[current].classList.add("active"); dots[current].classList.add("active");
}
function nextSlide() { goSlide(current+1); }
function prevSlide() { goSlide(current-1); }
setInterval(nextSlide, 5000);
window.addEventListener("scroll", () => { const y = window.scrollY; slides.forEach(s => { s.style.transform = `translateY(${y*0.36}px)`; }); });

// ═══ TOAST ═══
function showToast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2600); }

// ═══ HELPERS ═══
function getInitial(n) { return n ? n.charAt(0).toUpperCase() : "?"; }
function getStatusClass(s) { const v=(s||"").toLowerCase(); if(v==="available") return "status-available"; if(v==="busy") return "status-busy"; return "status-other"; }
function onFileChange(input) { document.getElementById("fileNameDisplay").textContent = input.files[0] ? input.files[0].name : "เลือกรูป"; }

// ═══ SUPABASE ═══
const db = window.supabase.createClient(
  "https://mhmchtcteweifnjegdgw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1obWNodGN0ZXdlaWZuamVnZGd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNDgzMjAsImV4cCI6MjA5MjkyNDMyMH0.7V0ZuFl2ESRkgEQnB1CX3_AZYSwkXwXl10vcVNNCDpQ"
);

async function uploadAvatar(file) {
  if (!file) return null;
  const ext = file.name.split(".").pop();
  const fileName = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const { data, error } = await db.storage.from("avatars").upload(fileName, file);
  if (error) { console.error(error); showToast("❌ upload พลาด"); return null; }
  const { data: urlData } = db.storage.from("avatars").getPublicUrl(data.path);
  return urlData.publicUrl;
}

async function addStudent() {
  const name = document.getElementById("nameInput").value.trim();
  const status = document.getElementById("statusInput").value.trim();
  const file = document.getElementById("avatarInput").files[0];
  if (!name) { showToast("⚠️ กรุณากรอกชื่อ"); return; }
  const btn = document.getElementById("btnAdd");
  btn.disabled = true; btn.textContent = "กำลังอัพโหลด...";
  const avatarUrl = await uploadAvatar(file);
  const { error } = await db.from("meow").insert([{ name, status: status||"available", avatar_url: avatarUrl }]);
  btn.disabled = false; btn.textContent = "เพิ่ม →";
  if (error) { console.error(error); showToast("❌ เพิ่มไม่สำเร็จ"); return; }

  showToast("✅ เพิ่มแล้ว!"); loadStudents();
}

let allStudents = [];

async function loadStudents() {
  const { data, error } = await db.from("meow").select("*");

  allStudents = data; renderStudents(data);
}

function renderStudents(data) {
  const list = document.getElementById("list");
  document.getElementById("countBadge").textContent = data.length;

  if (data.length === 0) { list.innerHTML = `<div class="empty"><div class="empty-icon">🎓</div><div>ยังไม่มีนักเรียน</div></div>`; return; }

      ? `<div class="card-img-wrap"><img class="card-img" src="${s.avatar_url}" alt="${s.name}"></div>`
      : `<div class="card-avatar-fallback">${getInitial(s.name)}</div>`;
    card.innerHTML = `${imgInner}
      <div class="card-body">
        <div class="card-name">${s.name}</div>
        <div class="card-status ${getStatusClass(s.status)}"><span class="pulse-dot"></span>${s.status}</div>
        <div class="card-actions">
          <button class="btn-edit">✏️ แก้ไข</button>
          <button class="btn-delete">🗑 ลบ</button>
        </div>
      </div>`;
    card.querySelector(".btn-edit").onclick = () => openEditModal(s);
    card.querySelector(".btn-delete").onclick = () => deleteStudent(s.id, s.avatar_url);
    list.appendChild(card);
  });
}

function filterStudents() {
  const q = document.getElementById("searchBox").value.toLowerCase();
  renderStudents(allStudents.filter(s => s.name.toLowerCase().includes(q)));
}

async function deleteStudent(id, avatarUrl) {
  if (!confirm("ยืนยันการลบนักเรียนคนนี้?")) return;
  if (avatarUrl) { const path = avatarUrl.split("/avatars/")[1]; if (path) await db.storage.from("avatars").remove([path]); }

}

function openEditModal(student) {

async function saveEdit() {

  const { error } = await db.from("meow").update({ name, status, avatar_url: avatarUrl }).eq("id", editingId);

// ═══════════════════════════════════════
// FLAPPY BIRD
// ═══════════════════════════════════════
const canvas = document.getElementById("flappyCanvas");
const ctx = canvas.getContext("2d");
const W = 480, H = 560;
const PIPE_W = 62, GAP = 158, PIPE_SPEED = 2.8;
const GRAVITY = 0.38, JUMP_VEL = -7.8;
const BIRD_X = 100, BIRD_R = 18;

let bird, pipes, score, gameState, animId;
let best = parseInt(localStorage.getItem("flappy_best") || "0");
document.getElementById("bestDisplay").textContent = best;

function initGame() {
  bird = { y: H / 2, vy: 0, angle: 0 };
  pipes = []; score = 0; gameState = "idle";
  cancelAnimationFrame(animId);
  document.getElementById("scoreDisplay").textContent = "0";
  drawFrame(); drawIdleOverlay();
}

function startGame() {
  if (gameState === "playing") { jump(); return; }
  bird = { y: H / 2, vy: JUMP_VEL, angle: -20 };
  pipes = [{ x: W + 60, top: randTop(), scored: false }];
  score = 0; gameState = "playing";
  document.getElementById("scoreDisplay").textContent = "0";
  cancelAnimationFrame(animId);
  loop();
}

function resetGame() { initGame(); }

function jump() {
  if (gameState === "playing") { bird.vy = JUMP_VEL; bird.angle = -28; }
  else { startGame(); }
}

function randTop() { return 70 + Math.random() * (H - GAP - 130); }

function loop() {
  update(); drawFrame();
  if (gameState === "playing") animId = requestAnimationFrame(loop);
}

function update() {
  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.angle = Math.min(bird.vy * 4.2, 75);

  if (pipes.length === 0 || pipes[pipes.length - 1].x < W - 195) {
    pipes.push({ x: W, top: randTop(), scored: false });
  }
  pipes.forEach(p => p.x -= PIPE_SPEED);
  pipes = pipes.filter(p => p.x > -PIPE_W - 20);

  pipes.forEach(p => {
    if (!p.scored && p.x + PIPE_W < BIRD_X) {
      p.scored = true; score++;
      document.getElementById("scoreDisplay").textContent = score;
      if (score > best) { best = score; localStorage.setItem("flappy_best", best); document.getElementById("bestDisplay").textContent = best; }
    }
  });

  if (bird.y - BIRD_R < 0 || bird.y + BIRD_R > H - 44) { endGame(); return; }
  for (const p of pipes) {
    if (BIRD_X + BIRD_R - 5 > p.x && BIRD_X - BIRD_R + 5 < p.x + PIPE_W) {
      if (bird.y - BIRD_R + 5 < p.top || bird.y + BIRD_R - 5 > p.top + GAP) { endGame(); return; }
    }
  }
}

function endGame() { gameState = "dead"; drawFrame(); drawDeadOverlay(); }

function drawFrame() {
  ctx.clearRect(0, 0, W, H);
  drawSky(); drawPipes(); drawGround(); drawBird();
  if (gameState === "playing") drawScoreHUD();
}

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, "#0a1628"); g.addColorStop(1, "#1e3a5f");
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // stars
  const starData = [[35,25],[115,55],[195,18],[305,72],[398,32],[455,65],[75,95],[255,48],[375,12],[160,130],[340,110]];
  starData.forEach(([x, y]) => {
    ctx.beginPath(); ctx.arc(x, y, 1.3, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${0.3+Math.random()*0.4})`; ctx.fill();
  });
}

function drawGround() {
  const g = ctx.createLinearGradient(0, H-44, 0, H);
  g.addColorStop(0, "#3d7a28"); g.addColorStop(1, "#1e3d12");
  ctx.fillStyle = g; ctx.fillRect(0, H-44, W, 44);
  ctx.fillStyle = "#52a832"; ctx.fillRect(0, H-44, W, 7);
  // dashes
  ctx.fillStyle = "rgba(255,255,255,0.08)";
  for (let x = 0; x < W; x += 40) ctx.fillRect(x, H-24, 24, 3);
}

function drawPipes() {
  pipes.forEach(p => {
    const pg = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
    pg.addColorStop(0, "#237a23"); pg.addColorStop(0.45, "#40c040"); pg.addColorStop(1, "#155015");

    // top
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.roundRect(p.x, 0, PIPE_W, p.top - 16, [0,0,5,5]); ctx.fill();
    ctx.fillStyle = "#55d855";
    ctx.beginPath(); ctx.roundRect(p.x - 7, p.top - 30, PIPE_W + 14, 30, 7); ctx.fill();
    // shine top
    ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.fillRect(p.x + 9, 0, 10, p.top - 16);

    // bottom
    const bt = p.top + GAP;
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.roundRect(p.x, bt + 16, PIPE_W, H - bt - 60, [5,5,0,0]); ctx.fill();
    ctx.fillStyle = "#55d855";
    ctx.beginPath(); ctx.roundRect(p.x - 7, bt, PIPE_W + 14, 30, 7); ctx.fill();
    // shine bottom
    ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.fillRect(p.x + 9, bt + 16, 10, H - bt - 60);
  });
}

function drawBird() {
  ctx.save();
  ctx.translate(BIRD_X, bird.y);
  ctx.rotate((bird.angle * Math.PI) / 180);

  // shadow
  ctx.beginPath(); ctx.ellipse(3, 4, BIRD_R+2, BIRD_R, 0, 0, Math.PI*2);
  ctx.fillStyle = "rgba(0,0,0,0.22)"; ctx.fill();

  // body
  const bg = ctx.createRadialGradient(-5, -5, 2, 0, 0, BIRD_R);
  bg.addColorStop(0, "#ffe566"); bg.addColorStop(0.65, "#e8b800"); bg.addColorStop(1, "#a07800");
  ctx.beginPath(); ctx.arc(0, 0, BIRD_R, 0, Math.PI*2);
  ctx.fillStyle = bg; ctx.fill();

  // wing
  ctx.beginPath(); ctx.ellipse(-3, 6, 12, 7, -0.35, 0, Math.PI*2);
  ctx.fillStyle = "#c09000"; ctx.fill();

  // eye white
  ctx.beginPath(); ctx.arc(7, -5, 7, 0, Math.PI*2); ctx.fillStyle = "#fff"; ctx.fill();
  // pupil
  ctx.beginPath(); ctx.arc(9, -4, 4, 0, Math.PI*2); ctx.fillStyle = "#111"; ctx.fill();
  // shine
  ctx.beginPath(); ctx.arc(10.5, -6, 1.6, 0, Math.PI*2); ctx.fillStyle = "#fff"; ctx.fill();

  // beak
  ctx.beginPath(); ctx.moveTo(12, -2); ctx.lineTo(23, 1); ctx.lineTo(12, 5); ctx.closePath();
  ctx.fillStyle = "#ff7700"; ctx.fill();

  ctx.restore();
}

function drawScoreHUD() {
  ctx.fillStyle = "rgba(0,0,0,0.38)";
  ctx.beginPath(); ctx.roundRect(W/2-40, 12, 80, 40, 10); ctx.fill();
  ctx.fillStyle = "#e8ff47";
  ctx.font = "bold 28px 'Bebas Neue', sans-serif";
  ctx.textAlign = "center"; ctx.fillText(score, W/2, 43);
}

function drawIdleOverlay() {
  ctx.fillStyle = "rgba(0,0,0,0.48)"; ctx.fillRect(0, H/2-75, W, 136);
  ctx.fillStyle = "#e8ff47";
  ctx.font = "bold 52px 'Bebas Neue', sans-serif"; ctx.textAlign = "center";
  ctx.fillText("FLAPPY BIRD", W/2, H/2-16);
  ctx.fillStyle = "rgba(255,255,255,0.72)";
  ctx.font = "16px 'DM Sans', sans-serif";
  ctx.fillText("กด Space หรือ คลิก เพื่อเริ่ม", W/2, H/2+26);
}

function drawDeadOverlay() {
  ctx.fillStyle = "rgba(0,0,0,0.58)"; ctx.fillRect(0, H/2-95, W, 168);
  ctx.fillStyle = "#f87171";
  ctx.font = "bold 50px 'Bebas Neue', sans-serif"; ctx.textAlign = "center";
  ctx.fillText("GAME OVER", W/2, H/2-32);
  ctx.fillStyle = "#e8ff47";
  ctx.font = "24px 'Bebas Neue', sans-serif";
  ctx.fillText(`SCORE: ${score}   BEST: ${best}`, W/2, H/2+12);
  ctx.fillStyle = "rgba(255,255,255,0.62)";
  ctx.font = "14px 'DM Sans', sans-serif";
  ctx.fillText("คลิก หรือ Space เพื่อเล่นอีกครั้ง", W/2, H/2+48);
}

// input
document.addEventListener("keydown", e => {
  if (e.code === "Space" && (e.target === document.body || e.target === canvas)) {
    e.preventDefault(); jump();
  }
});
canvas.addEventListener("click", jump);
canvas.addEventListener("touchstart", e => { e.preventDefault(); jump(); }, { passive: false });

initGame();
</script>
